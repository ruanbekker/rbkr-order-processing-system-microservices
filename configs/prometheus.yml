global:
  scrape_interval: 5s

scrape_configs:
  - job_name: 'order-service'
    static_configs:
      - targets: ['order-service:8080']

  - job_name: 'inventory-service'
    static_configs:
      - targets: ['inventory-service:2112']

  - job_name: 'notification-service'
    static_configs:
      - targets: ['notification-service:2112']
