apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
    spec:
      containers:
        - name: order-service
          image: ttl.sh/rbkr-ops-order-service:2h
          ports:
            - containerPort: 8080
          env:
            - name: DATABASE_URL
              value: postgres://user:pass@postgres:5432/orders?sslmode=disable
            - name: KAFKA_BROKERS
              value: kafka:9092
