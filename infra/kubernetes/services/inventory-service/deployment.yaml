apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: inventory-service
  template:
    metadata:
      labels:
        app: inventory-service
    spec:
      containers:
        - name: inventory-service
          image: ttl.sh/rbkr-ops-inventory-service:2h
          env:
            - name: KAFKA_BROKERS
              value: kafka:9092
            - name: REDIS_ADDR
              value: redis:6379
